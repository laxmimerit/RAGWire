site_name: RAGWire
site_description: Production-grade RAG toolkit for document ingestion and retrieval with hybrid search support
site_url: https://laxmimerit.github.io/RAGWire
repo_url: https://github.com/laxmimerit/RAGWire
repo_name: laxmimerit/RAGWire
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/ragwire.png
  favicon: assets/ragwire.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation & Setup: setup.md
    - Quick Tutorial: tutorial.md
    - Metadata & Filtering: metadata.md
  - Providers:
    - Ollama (Local): ollama.md
    - OpenAI: openai.md
    - Google Gemini: gemini.md
    - Groq: groq.md
    - Anthropic: anthropic.md
    - HuggingFace: huggingface.md
    - FastEmbed: fastembed.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/laxmimerit/RAGWire
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/kgptalkie
    - icon: fontawesome/solid/globe
      link: https://kgptalkie.com
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ragwire

