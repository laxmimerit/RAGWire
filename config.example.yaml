# RAGWire Configuration Example
# ==============================
# Copy this file to config.yaml and edit for your environment.

# =================================================================
# Document Loader
# =================================================================
loader:
  extensions: [".pdf", ".docx", ".xlsx", ".pptx", ".txt", ".md"]

# =================================================================
# Text Splitter
# =================================================================
splitter:
  chunk_size: 10000
  chunk_overlap: 2000
  strategy: "markdown"   # "markdown" | "recursive"

# =================================================================
# Embedding Model
# =================================================================
embeddings:
  # --- Ollama (local, no API key) ---
  provider: "ollama"
  model: "qwen3-embedding:0.6b"
  base_url: "http://localhost:11434"

  # --- OpenAI ---
  # provider: "openai"
  # model: "text-embedding-3-small"

  # --- HuggingFace (local) ---
  # provider: "huggingface"
  # model_name: "sentence-transformers/all-MiniLM-L6-v2"

  # --- Google ---
  # provider: "google"
  # model: "models/embedding-001"

# =================================================================
# LLM — used for metadata extraction on every ingested document
# =================================================================
llm:
  # --- Ollama (local) ---
  provider: "ollama"
  model: "qwen3.5:9b"
  base_url: "http://localhost:11434"
  num_ctx: 16384         # Context window — must fit your largest chunk

  # --- OpenAI ---
  # provider: "openai"
  # model: "gpt-5.4-nano"

# =================================================================
# Metadata Extraction (optional)
# =================================================================
# metadata:
#   config_file: "metadata.yaml"   # Path to a custom metadata YAML (see metadata.example.yaml)
#                                  # If omitted, the built-in financial fields are used:
#                                  # company_name, doc_type, fiscal_quarter, fiscal_year

# =================================================================
# Vector Store (Qdrant)
# =================================================================
vectorstore:
  url: "http://localhost:6333"
  # api_key: "${QDRANT_API_KEY}"   # For Qdrant Cloud
  # url: "./qdrant_storage"        # For local file-based storage
  collection_name: "financial_docs"
  use_sparse: true       # true enables hybrid search (requires: pip install fastembed)
  force_recreate: false  # Set true ONLY to wipe and rebuild the collection

# =================================================================
# Retriever
# =================================================================
retriever:
  search_type: "hybrid"   # "similarity" | "mmr" | "hybrid" (hybrid requires use_sparse: true)
  top_k: 5
  auto_filter: false       # If true, LLM automatically extracts metadata filters from every query.
                           # Default false — use rag.extract_filters(query) to let an agent decide.

# =================================================================
# Logging
# =================================================================
logging:
  level: "INFO"
  console_output: true
  colored: true
  # log_file: "logs/rag.log"
